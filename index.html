<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTRL 3 Media Inc.</title>
  <link rel="icon" type="image/x-icon" href="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/a2faa19de_favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #e8e8e8;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* subtle teal glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 45% at 50% 50%, rgba(0,201,167,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── CENTER BLOCK ── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    /* CTRL 3 logo — mix-blend-mode:screen so black bg on JPEG disappears */
    .logo {
      width: 80vw;
      max-width: 640px;
      min-width: 220px;
      mix-blend-mode: screen;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    /* BUILDING with blinking cursor */
    .building {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #444;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }
    .building::after {
      content: '|';
      color: #00c9a7;
      animation: blink 1.1s step-end infinite;
      margin-left: 3px;
    }

    /* TAGLINE below building */
    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #2a2a2a;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    /* ── BRAND LINKS (fixed bottom center) ── */
    .brands {
      position: fixed;
      bottom: 72px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .brand-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .brand-link:hover { transform: translateY(-3px); opacity: 0.7; }

    .brand-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* Rec Room: transparent PNG, normal blend */
    .brand-logo.recroom { mix-blend-mode: normal; }

    /* ConMen: black bg JPEG, screen blend removes black */
    .brand-logo.conmen { mix-blend-mode: screen; }

    .brand-divider {
      width: 1px;
      height: 36px;
      background: rgba(255,255,255,0.07);
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
    }

    /* ── PORTAL LINK (fixed bottom right) ── */
    .portal-link {
      position: fixed;
      bottom: 28px;
      right: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #444;
      text-decoration: none;
      background: rgba(255,255,255,0.03);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: color 0.25s, border-color 0.25s;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1s ease 1.3s forwards;
    }
    .portal-link:hover { color: #00c9a7; border-color: rgba(0,201,167,0.3); }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00c9a7;
      opacity: 0.6;
      transition: opacity 0.25s;
    }
    .portal-link:hover .dot { opacity: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .brands { bottom: 68px; gap: 24px; }
      .portal-link { bottom: 20px; right: 16px; font-size: 13px; }
      .tagline { font-size: 9px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>

  <div class="center">
    <img
      class="logo"
      src="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/7ba4f0703_ctrl3_logo_cropped.png"
      alt="CTRL 3 Media Inc."
    />
    <div class="building">Building</div>
    <div class="tagline">Content &nbsp;·&nbsp; Strategy &nbsp;·&nbsp; Community</div>
  </div>

  <div class="brands">
    <a class="brand-link" href="https://www.instagram.com/recroom.ph?igsh=dmx3azlmcXBlcjBk" target="_blank" rel="noopener">
      <img class="brand-logo recroom"
           src="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/6c1bd6806_recroom_logo_white.png"
           alt="Rec Room PH" />
      <span class="brand-name">Rec Room</span>
    </a>
    <div class="brand-divider"></div>
    <a class="brand-link" href="https://www.instagram.com/conmenph?igsh=eXh3aDBxenllZXZw" target="_blank" rel="noopener">
      <img class="brand-logo conmen"
           src="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/ed86656bf_file_113.jpg"
           alt="ConMen" />
      <span class="brand-name">ConMen</span>
    </a>
  </div>

  <a class="portal-link" href="/portal.html" target="_blank">
    <span class="dot"></span>
    Employee Portal
  </a>

</body>
</html>
