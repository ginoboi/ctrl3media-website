<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTRL 3 Media Inc.</title>
  <link rel="icon" type="image/x-icon" href="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/a2faa19de_favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #e8e8e8;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* subtle radial glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,201,167,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 420px;
      max-width: 80vw;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
      mix-blend-mode: screen;
    }

    .building {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #444;
      opacity: 0;
      animation: fadeUp 1s ease 0.7s forwards;
    }

    /* blinking cursor after text */
    .building::after {
      content: '|';
      color: #00c9a7;
      animation: blink 1.1s step-end infinite;
      margin-left: 4px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* bottom-right portal link */
    .portal-link {
      position: fixed;
      bottom: 28px;
      right: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #444;
      text-decoration: none;
      transition: color 0.25s;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    .portal-link:hover { color: #00c9a7; }

    .portal-link .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00c9a7;
      opacity: 0.5;
      transition: opacity 0.25s;
    }

    .portal-link:hover .dot { opacity: 1; }

    /* corner grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    @media (max-width: 768px) {
      .logo {
        width: 75vw;
      }

      .building {
        font-size: 11px;
        letter-spacing: 4px;
      }

      .portal-link {
        bottom: 20px;
        right: 16px;
        font-size: 12px;
        background: rgba(0,0,0,0.6);
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid rgba(0,201,167,0.2);
        color: #888;
      }

      .brands {
        bottom: 68px;
        gap: 20px;
      }
    }
  
    /* BRAND LINKS */
    .brands {
      display: flex;
      gap: 28px;
      align-items: center;
      justify-content: center;
      position: fixed;
      bottom: 72px;
      left: 0;
      right: 0;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .brand-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .brand-link:hover {
      transform: translateY(-3px);
      opacity: 0.75;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 50%;
    }

    .brand-logo.recroom {
      mix-blend-mode: screen;
    }

    .brand-logo.conmen {
      mix-blend-mode: screen;
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #3a3a3a;
    }

    .brand-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.06);
    }

  </style>
</head>
<body>

  <div class="center">
    <img
      class="logo"
      src="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/2ad197aaa_1c3108a1c_file_110.jpg"
      alt="CTRL 3 Media Inc."
    />
    <div class="building">Building</div>
  </div>

  <div class="brands">
    <a class="brand-link" href="https://www.instagram.com/recroom.ph?igsh=dmx3azlmcXBlcjBk" target="_blank" rel="noopener">
      <img class="brand-logo recroom" src="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/c98bba305_file_114.jpg" alt="Rec Room PH" />
      <span class="brand-name">Rec Room</span>
    </a>
    <div class="brand-divider"></div>
    <a class="brand-link" href="https://www.instagram.com/conmenph?igsh=eXh3aDBxenllZXZw" target="_blank" rel="noopener">
      <img class="brand-logo conmen" src="https://base44.app/api/apps/6a089110f76438ad64364898/files/mp/public/6a089110f76438ad64364898/ed86656bf_file_113.jpg" alt="ConMen" />
      <span class="brand-name">ConMen</span>
    </a>
  </div>

  <a class="portal-link" href="/portal.html" target="_blank">
    <span class="dot"></span>
    Employee Portal
  </a>

</body>
</html>
